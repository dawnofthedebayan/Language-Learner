<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Language Learner - Daily Lessons</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="header-left">
                <h1>🇩🇪 German Language Learner</h1>
                <p class="subtitle">Daily News & Topic Discussions (B2-C2)</p>
            </div>
            <div class="header-right">
                <p class="author-tag">Made by the nerd Debayan Bhattacharya who considers German his final boss 🎮</p>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="filters">
            <div class="filter-group">
                <label for="filter-type">Type:</label>
                <select id="filter-type">
                    <option value="">All</option>
                    <option value="news">News</option>
                    <option value="topic">Topic</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-topic">Topic:</label>
                <select id="filter-topic">
                    <option value="">All Topics</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-model">Model:</label>
                <select id="filter-model">
                    <option value="">All Models</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-date">Date:</label>
                <input type="date" id="filter-date">
            </div>

            <button id="reset-filters" class="btn-secondary">Reset Filters</button>
        </section>

        <section id="lessons-grid" class="lessons-grid">
            <div class="loading">Loading lessons...</div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
