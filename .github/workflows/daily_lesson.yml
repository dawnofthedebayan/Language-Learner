name: Daily German Lesson

on:
  schedule:
    - cron: "0 6 * * *"  # Every day at 07:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  daily-lesson:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Needed to commit updated memory.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily lesson
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          AUDIO_BACKEND: ${{ vars.AUDIO_BACKEND }}
        run: python github_action_runner.py

      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: lesson-audio
          path: data/lesson_audio.mp3
          if-no-files-found: ignore

      - name: Export lessons to JSON
        run: python export_lessons.py

      - name: Commit updated database and docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add language_learner.db docs/lessons.json
          git diff --cached --quiet || git commit -m "chore: update lessons database [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
